# Apply all Kubernetes resources at once
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: occurrence-annotation

resources:
  - namespace.yaml
  - postgres-secrets.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - backend-configmap.yaml
  - backend-deployment.yaml
  - backend-service.yaml

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: occurrence-annotation
  app.kubernetes.io/part-of: gbif-occurrence

# Prefix for all resources (optional)
# namePrefix: dev-

# Images to use (can be overridden)
images:
  - name: occurrence-annotation-backend
    newTag: latest
