name: Test UI

on:
  push:
    branches: [main, dev, 'feature/**', 'security/**']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Security audit
        working-directory: ui
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Check TypeScript
        working-directory: ui
        run: npx tsc --noEmit
