<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/annotations/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy (defense-in-depth).
      Notes:
      - 'unsafe-inline' on style-src is required by shadcn/Radix runtime styles.
      - connect-src lists every cross-origin API the app talks to.
      - img-src includes OSM tile hosts used by pigeon-maps.
      - frame-ancestors / HSTS should also be set at the proxy/CDN for full coverage.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://tile.openstreetmap.org https://tile.gbif.org https://*.arcgisonline.com https://api.gbif.org; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.gbif.org https://api.openai.com http://localhost:8080; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
    />
    <title>GBIF Occurrence Annotations</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
